// ═══════════════════════════════════════════════════════════════════

// Real inference. Zero training. CRT terminal.

const DIM = 16;
const TREE_WIDTH = 3;
const TREE_DEPTH = 2;
const CORPSE_LEN = 12;
const TOP_K = 6;
const ALPHA_D = 0.30;
const BETA_D = 0.15;
const GAMMA_D = 0.25;
const TAU_BASE = 0.85;
const BIGRAM_W = 2.0;
const CHAMBERS = ['FEAR','LOVE','RAGE','VOID','FLOW','CMPLX'];
const CHAMBER_DECAY = [0.90, 0.93, 0.85, 0.97, 0.88, 0.94];
const CROSSFIRE_K = 0.02;
const STOPS = new Set("the a an is are was were be been being have has had do does did will would shall should may might can could and but or nor for yet so in on at to of by with from what that this it i you he she we they my his her its our your their me him us them not no very just also only".split(" "));

const TEMPLATES = [
    "{0} {1} {2}, where {3} becomes {4}.",
    "{0} is {1}. {2} {3}. nothing remains.",
    "when {0} {1}, {2} forgets {3}.",
    "{0} {1} {2} until {3} consumes.",
    "where {0} {1}, {2} becomes {3}, and {4} persists.",
    "through {0}, {1} {2} {3}. darkness remains.",

const CAT_CHAMBER = {
    'body / anatomy':0, 'decay / death':3, 'medical / autopsy':0,
    'language / text / structure':4, 'transformation / process':4,

// ═══ PARSE VOCABULARY ═══
function parseVocab(text) {
    const words = [], cats = {};
    let cat = 'uncategorized';
    for (const line of text.split('\n')) {
        const t = line.trim();
        if (!t) continue;
        if (t.startsWith('#')) {
            cat = t.slice(1).trim().toLowerCase();
            cats[cat] = [];
            continue;
        }
        const w = t.toLowerCase();
        if (w && !words.includes(w)) {
            words.push(w);
            if (!cats[cat]) cats[cat] = [];
            cats[cat].push(w);
        }
    }
    return { words, cats };
}

// ═══ HASH EMBEDDING (FNV-1a) ═══
function hashEmbed(word) {
    let h = 2166136261;
    for (let i = 0; i < word.length; i++) {
        h ^= word.charCodeAt(i);
        h = Math.imul(h, 16777619) >>> 0;
    }
    const vec = [];
    for (let i = 0; i < DIM; i++) {
        h ^= h >>> 13; h = Math.imul(h, 1597334677) >>> 0; h ^= h >>> 16;
        vec.push((h & 0xFFFF) / 32768.0 - 1.0);
    }
    const norm = Math.sqrt(vec.reduce((s, x) => s + x * x, 0)) + 1e-10;
    return vec.map(x => x / norm);
}

function cosSim(a, b) {
    let s = 0;
    for (let i = 0; i < a.length; i++) s += a[i] * b[i];
    return s;
}

// ═══ PHONETIC ═══
function phonetic(word) {
    let w = word;
    if (w.length > 3 && w[w.length-1] === 'e' && !'aeiou'.includes(w[w.length-2]))
        w = w.slice(0, -1);
    const vowels = 'aeiou';
    let lastV = -1;
    for (let i = 0; i < w.length; i++)
        if (vowels.includes(w[i])) lastV = i;
    return lastV >= 0 ? w.slice(lastV) : w.slice(-3);
}

function rhymes(a, b) {
    return a !== b && a.length > 2 && b.length > 2 && phonetic(a) === phonetic(b);
}

// ═══ ENGINE ═══
class MicroKarpathy {
    constructor(vocabText) {
        const { words, cats } = parseVocab(vocabText);
        this.words = words;
        this.cats = cats;
        this.w2i = {};
        words.forEach((w, i) => this.w2i[w] = i);
        this.V = words.length;
        this.embeds = {};
        words.forEach(w => this.embeds[w] = hashEmbed(w));
        // MetaWeights
        this.bigram = {};
        this.cooc = {};
        this.prophecy = {};
        this.destiny = new Float32Array(this.V);
        this.trauma = 0;
        this._buildMeta();
        // Chambers
        this.chambers = CHAMBERS.map(() => Math.random() * 0.2);
    }

    _buildMeta() {
        for (let i = 0; i < this.V; i++) {
            for (let j = Math.max(0, i-5); j <= Math.min(this.V-1, i+5); j++) {
                if (i === j) continue;
                const decay = 1.0 / (1.0 + Math.abs(i - j));
                const key = Math.min(i,j) + ',' + Math.max(i,j);
                this.cooc[key] = (this.cooc[key] || 0) + decay;
                if (j === i + 1) this.bigram[i+','+j] = (this.bigram[i+','+j] || 0) + 1;
            }
        }
    }

    hebb(a, b) { return this.cooc[Math.min(a,b)+','+Math.max(a,b)] || 0; }
    bi(a, b) { return this.bigram[a+','+b] || 0.001; }

    exciteChamber(word) {
        const cat = Object.entries(this.cats).find(([, ws]) => ws.includes(word));
        if (cat && CAT_CHAMBER[cat[0]] !== undefined) {
            const idx = CAT_CHAMBER[cat[0]];
            this.chambers[idx] = Math.min(1, this.chambers[idx] + 0.25);
        }
    }

    stepChambers() {
        for (let iter = 0; iter < 5; iter++) {
            const old = [...this.chambers];
            for (let i = 0; i < 6; i++) {
                this.chambers[i] *= CHAMBER_DECAY[i];
                for (let j = 0; j < 6; j++)
                    if (i !== j) this.chambers[i] += CROSSFIRE_K * Math.sin(old[j] - old[i]);
                this.chambers[i] = Math.max(0, Math.min(1, this.chambers[i]));
            }
        }
    }

    tauMod() { return 1.0 + 0.3*this.chambers[1] - 0.2*this.chambers[2] + 0.15*this.chambers[4]; }

    nearestVocab(word) {
        const vec = hashEmbed(word);
        let best = this.words[0], bestS = -2;
        for (const w of this.words) {
            const s = cosSim(vec, this.embeds[w]);
            if (s > bestS) { best = w; bestS = s; }
        }
        return best;
    }

    dissect(prompt) {
        let tokens = prompt.toLowerCase().split(/[\s,.;!?'"()\[\]-]+/).filter(t => t.length > 2 && !STOPS.has(t));
        const vocabSet = new Set(this.words);
        let core = [];
        const seen = new Set();
        for (const t of tokens) {
            const w = vocabSet.has(t) ? t : this.nearestVocab(t);
            if (!seen.has(w)) { core.push(w); seen.add(w); }
        }
        if (!core.length) core = [this.words[0]];
        return core.slice(0, 4);
    }

    findNeighbors(word, n) {
        const wid = this.w2i[word];
        if (wid === undefined) return this._sample(this.words, n);
        // teleport: 30% chance
        const teleports = [];
        let nLocal = n;
        if (Math.random() < 0.3 && this.V > 100) {
            const region = Math.floor(wid / 80);
            const distant = this.words.filter(w => Math.abs(Math.floor(this.w2i[w]/80) - region) >= 2);
            if (distant.length) { teleports.push(distant[Math.floor(Math.random()*distant.length)]); nLocal--; }
        }
        const scored = [];
        for (const w of this.words) {
            if (w === word) continue;
            const oid = this.w2i[w];
            const h = this.hebb(wid, oid);
            const c = cosSim(this.embeds[word], this.embeds[w]);
            scored.push([h * 0.7 + c * 0.3, w]);
        }
        scored.sort((a, b) => b[0] - a[0]);
        const top = scored.slice(0, nLocal * 2).map(s => s[1]);
        return this._sample(top, Math.min(nLocal, top.length)).concat(teleports);
    }

    _sample(arr, n) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
        return a.slice(0, n);
    }

    buildTree(root, w = TREE_WIDTH, d = TREE_DEPTH) {
        if (d === 0) return { w: root, ch: [] };
        const nbrs = this.findNeighbors(root, w);
        return { w: root, ch: nbrs.map(n => this.buildTree(n, w, d - 1)) };
    }

    collectLeaves(tree) {
        if (!tree.ch.length) return [tree.w];
        return tree.ch.flatMap(c => this.collectLeaves(c));
    }

    darioSample(ctx, candidates, usedCats) {
        if (!candidates.length) return Math.floor(Math.random() * this.V);
        const prev = ctx[ctx.length - 1] || 0;
        const tau = TAU_BASE * this.tauMod();
        const scores = candidates.map(cid => {
            const B = BIGRAM_W * Math.log(this.bi(prev, cid) + 1e-10);
            const H = ALPHA_D * this.hebb(prev, cid);
            const F = BETA_D * (this.prophecy[cid] || 0);
            const A = GAMMA_D * this.destiny[cid];
            const Tr = this.trauma * 0.1;
            const region = Math.floor(cid / 80);
            const div = -1.5 * (usedCats[region] || 0);
            return (B + H + F + A + Tr + div) / tau;
        });
        // softmax + top-k
        const mx = Math.max(...scores);
        const exps = scores.map(s => Math.exp(s - mx));
        const sm = exps.reduce((a, b) => a + b, 0) + 1e-10;
        const probs = exps.map(e => e / sm);
        const indexed = probs.map((p, i) => [i, p]).sort((a, b) => b[1] - a[1]).slice(0, TOP_K);
        const topP = indexed.reduce((s, [,p]) => s + p, 0) + 1e-10;
        let r = Math.random(), cum = 0;
        for (const [i, p] of indexed) {
            cum += p / topP;
            if (r <= cum) return candidates[i];
        }
        return candidates[indexed[indexed.length-1][0]];
    }

    reassemble(leafWords) {
        const leafIds = [...new Set(leafWords.map(w => this.w2i[w]).filter(id => id !== undefined))];
        if (!leafIds.length) return [];
        for (const lid of leafIds) this.destiny[lid] += 1.0;
        // prophecies
        const freq = {};
        leafIds.forEach(id => freq[id] = (freq[id]||0) + 1);
        Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0,8).forEach(([id,cnt]) => {
            this.prophecy[+id] = (this.prophecy[+id]||0) + cnt * 0.5;
        });
        const chain = [leafIds[Math.floor(Math.random()*leafIds.length)]];
        const used = new Set(chain);
        const usedCats = {};
        for (let s = 0; s < CORPSE_LEN - 1; s++) {
            this.exciteChamber(this.words[chain[chain.length-1]]);
            this.stepChambers();
            let cands = leafIds.filter(id => !used.has(id));
            if (cands.length < 3) cands = leafIds;
            const nxt = this.darioSample(chain, cands, usedCats);
            chain.push(nxt);
            used.add(nxt);
            const region = Math.floor(nxt / 80);
            usedCats[region] = (usedCats[region]||0) + 1;
            // online hebbian
            const prev = chain[chain.length-2];
            const key = Math.min(prev,nxt)+','+Math.max(prev,nxt);
            this.cooc[key] = (this.cooc[key]||0) + 0.5;
            this.bigram[prev+','+nxt] = (this.bigram[prev+','+nxt]||0) + 0.5;
            delete this.prophecy[nxt];
            this.trauma = Math.min(1, this.trauma + 0.05) * 0.97;
        }
        return chain;
    }

    _wordCat(word) {
        for (const [cat, ws] of Object.entries(this.cats))
            if (ws.includes(word)) return cat;
        return null;
    }

    _brodskyFormat(words) {
        // Brodsky punctuation: nouns comma-separated, verbs isolated, dashes for drama
        const verbCats = new Set(['action verbs','transformation / process']);
        const out = [];
        let nn = 0;
        for (const w of words) {
            const cat = this._wordCat(w);
            const isVerb = cat && verbCats.has(cat);
            if (isVerb) {
                if (out.length) out.push('. ');
                out.push(w[0].toUpperCase() + w.slice(1));
                nn = 0;
            } else {
                if (!out.length) {
                    out.push(w[0].toUpperCase() + w.slice(1));
                } else if (nn >= 2) {
                    out.push(' \u2014 ' + w);
                    nn = 0;
                } else {
                    const last = out[out.length-1];
                    if (last && (last.endsWith('.') || last.endsWith('!'))) {
                        out.push(' ' + w[0].toUpperCase() + w.slice(1));
                    } else {
                        out.push(', ' + w);
                    }
                }
                nn++;
            }
        }
        return out.join('');
    }

    makeCoda(chain) {
        const cw = chain.map(id => this.words[id]);
        const shuffled = [...cw].sort(() => Math.random() - 0.5);
        let end1 = null, end2 = null;
        for (const w1 of shuffled) {
            for (const w2 of cw) { if (rhymes(w1, w2)) { end1 = w1; end2 = w2; break; } }
            if (end1) break;
            for (const w2 of this.words) { if (rhymes(w1, w2)) { end1 = w1; end2 = w2; break; } }
            if (end1) break;
        }
        if (!end1) { end1 = cw[0]; end2 = cw[cw.length-1]; }
        const body = cw.filter(w => w !== end1 && w !== end2);
        const mid = Math.max(Math.floor(body.length/2), 2);
        const l1 = [...body.slice(0, mid), end1];
        let l2 = [...body.slice(mid, mid+5), end2];
        if (l2.length < 3) l2 = [...body.slice(1,5), end2];
        return [this._brodskyFormat(l1), this._brodskyFormat(l2)];
    }

    chambersDisplay() {
        return CHAMBERS.map((n,i) => this.chambers[i] > 0.08 ? `${n}:${this.chambers[i].toFixed(2)}` : null).filter(Boolean).join(' ');
    }
}

// ═══ UI ═══
let engine = new MicroKarpathy(DEFAULT_VOCAB);
let term = document.getElementById("console");
let inputEl = document.getElementById("prompt");
let btnEl = document.getElementById("btn");
let cursorHtml = '<span class="cursor"></span>';
let isTyping = false;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function scrollBottom() { term.scrollTop = term.scrollHeight; }

async function typeText(text, delay = 12, cls = "") {
    let html = term.innerHTML.replace(cursorHtml, "");
    const open = cls ? `<span class="${cls}">` : "";
    const close = cls ? "</span>" : "";
    for (let i = 0; i < text.length; i++) {
        html += open + text.charAt(i) + close;
        term.innerHTML = html + cursorHtml;
        scrollBottom();
        await sleep(delay + Math.random() * 8);
    }
}

async function printTree(tree, prefix, isLast) {
    const conn = isLast ? '\u2514\u2500 ' : '\u251c\u2500 ';
    await typeText(prefix + conn, 3);
    await typeText(tree.w + '\n', 8, 'bone');
    const childPre = prefix + (isLast ? '   ' : '\u2502  ');
    for (let i = 0; i < tree.ch.length; i++) {
        await printTree(tree.ch[i], childPre, i === tree.ch.length - 1);
    }
}

function loadVocabFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        engine = new MicroKarpathy(e.target.result);
        const html = term.innerHTML.replace(cursorHtml, "");
        term.innerHTML = html + `\n<span class="bone">  [loaded ${engine.V} words from ${file.name}]</span>\n` + cursorHtml;
        scrollBottom();
    };
    reader.readAsText(file);
}

inputEl.addEventListener("keypress", (e) => { if (e.key === "Enter") { e.preventDefault(); startAutopsy(); } });

async function startAutopsy() {
    const prompt = inputEl.value.trim();
    if (!prompt || isTyping) return;
    isTyping = true;
    inputEl.value = "";
    inputEl.disabled = true;
    btnEl.disabled = true;

    // reset engine state for this autopsy
    engine.prophecy = {};
    engine.destiny = new Float32Array(engine.V);
    engine.trauma = 0;
    engine.chambers = CHAMBERS.map(() => Math.random() * 0.2);

    term.innerHTML = term.innerHTML.replace(cursorHtml, "") +
        `\n<span class="bone">> ${prompt}</span>\n\n` + cursorHtml;
    scrollBottom();

    await sleep(300);
    await typeText("\u2554" + "\u2550".repeat(58) + "\u2557\n");
    await typeText("\u2551  MICROKARPATHY \u2014 Prompt Autopsy Without Weights", 8);
    await typeText(" ".repeat(9) + "\u2551\n", 2);
    await typeText("\u2551  p(x|\u03a6) = softmax((B + \u03b1H + \u03b2F + \u03b3A + T) / \u03c4)", 8);
    await typeText(" ".repeat(12) + "\u2551\n", 2);
    await typeText("\u2551  zero weights \u00b7 zero gradients \u00b7 zero mercy", 8);
    await typeText(" ".repeat(14) + "\u2551\n", 2);
    await typeText("\u255a" + "\u2550".repeat(58) + "\u255d\n\n");

    await typeText(`  vocab: ${engine.V} words | trained: 0\n\n`);
    await typeText("=" .repeat(60) + "\n");
    await typeText("  AUTOPSY REPORT\n", 15, "blood");
    await typeText(`  Subject: "${prompt}"\n`);
    await typeText("=".repeat(60) + "\n\n");

    // Dissection
    const core = engine.dissect(prompt);
    await typeText("  Core words: ");
    await typeText(core.join(" ") + "\n", 20, "bone");

    // Mutation trees
    let allLeaves = [];
    for (const word of core) {
        await typeText(`\n  Tree [${word}]:\n`, 10, "blood");
        const tree = engine.buildTree(word);
        await printTree(tree, "    ", true);
        allLeaves.push(...engine.collectLeaves(tree));
    }
    const unique = [...new Set(allLeaves)];
    await typeText(`\n  Collected ${unique.length} unique leaves\n\n`, 10);
    await sleep(400);

    // Reassembly
    const chain = engine.reassemble(unique);
    const corpse = chain.map(id => engine.words[id]);
    await typeText("  \u2500\u2500 CORPSE \u2500".repeat(5) + "\n", 8, "blood");

    // Template sentence
    if (corpse.length >= 5) {
        const tmpl = TEMPLATES[Math.floor(Math.random() * TEMPLATES.length)];
        const shuffled = [...corpse].sort(() => Math.random()-0.5);
        const fill = shuffled.slice(0, 6);
        while (fill.length < 6) fill.push(corpse[0]);
        let txt = tmpl;
        for (let i = 0; i < 6; i++) txt = txt.replace(`{${i}}`, fill[i] || '');
        await typeText("  " + txt + "\n", 35);
    }
    await typeText("  " + corpse.join(" ") + ".\n\n", 25);
    await sleep(500);

    // Coda
    const [l1, l2] = engine.makeCoda(chain);
    await typeText("  \u2500\u2500 CODA \u2500".repeat(5) + "\n", 8, "blood");
    await typeText("  " + l1 + ",\n", 40, "blood");
    await typeText("  " + l2 + ".\n\n", 40, "blood");
    await sleep(400);

    // Chambers
    const chDisplay = engine.chambersDisplay();
    if (chDisplay) await typeText(`  chambers: ${chDisplay}\n`, 10);

    // Metrics
    const fps = new Set(corpse.map(phonetic));
    const pd = (fps.size / Math.max(corpse.length, 1)).toFixed(3);
    const md = (new Set(allLeaves).size / Math.max(allLeaves.length, 1)).toFixed(3);
    const bar = v => '#'.repeat(Math.floor(v*20)) + '.'.repeat(20 - Math.floor(v*20));
    await typeText("\n  \u2500\u2500 METRICS \u2500".repeat(5) + "\n", 8);
    await typeText(`  Phonetic Diversity: [${bar(pd)}] ${pd}\n`);
    await typeText(`  Mutation Depth:     [${bar(md)}] ${md}\n`);
    await typeText(`\n  Vocabulary: ${engine.V} | Prophecies: ${Object.keys(engine.prophecy).length} active | Trauma: ${engine.trauma.toFixed(3)}\n`);

    await sleep(800);
    let html = term.innerHTML.replace(cursorHtml, "");
    html += `<div class="signature">\n  [autopsy complete. \u2014 microKarpathy.]\n</div>\n\n`;
    term.innerHTML = html + cursorHtml;
    scrollBottom();

    isTyping = false;
    inputEl.disabled = false;
    btnEl.disabled = false;
    inputEl.focus();
}
</script>
