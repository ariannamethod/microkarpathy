// ═══════════════════════════════════════════════════════════════════
// PARSER / HELPERS
// ═══════════════════════════════════════════════════════════════════
function parseVocab(text){
  const words = [];
  const cats = {};
  let cat = 'uncategorized';
  const seen = new Set();
  for(const rawLine of text.split('\n')){
    const line = rawLine.trim();
    if(!line) continue;
    if(line.startsWith('#')){
      cat = line.slice(1).trim().toLowerCase();
      cats[cat] = cats[cat] || [];
      continue;
    }
    const w = line.toLowerCase().trim();
    if(w && !seen.has(w)){
      seen.add(w);
      words.push(w);
      cats[cat] = cats[cat] || [];
      cats[cat].push(w);
    }
  }
  return {words, cats};
}

function wordToCat(word, cats){
  for(const [cat, ws] of Object.entries(cats)){
    if(ws.includes(word)) return cat;
  }
  return null;
}

function charBigrams(word){
  const out = new Set();
  if(word.length <= 1){
    out.add(word);
    return out;
  }
  for(let i=0;i<word.length-1;i++) out.add(word.slice(i,i+2));
  return out;
}

// FNV-1a hash embedding, matched conceptually to Python version
function hashEmbed(word){
  let h = 2166136261 >>> 0;
  for(let i=0;i<word.length;i++){
    h ^= word.charCodeAt(i);
    h = Math.imul(h, 16777619) >>> 0;
  }
  const vec = [];
  for(let i=0;i<DIM;i++){
    h ^= h >>> 13;
    h = Math.imul(h, 1597334677) >>> 0;
    h ^= h >>> 16;
    vec.push((h & 0xFFFF) / 32768.0 - 1.0);
  }
  const norm = Math.sqrt(vec.reduce((s,x)=>s+x*x,0)) + 1e-10;
  return vec.map(x => x / norm);
}

function cosineSim(a,b){
  let s = 0;
  for(let i=0;i<a.length;i++) s += a[i]*b[i];
  return s;
}

function softmaxVec(logits){
  const mx = Math.max(...logits);
  const exps = logits.map(v => Math.exp(v - mx));
  const total = exps.reduce((a,b)=>a+b,0) + 1e-10;
  return exps.map(e => e/total);
}

function rmsnorm(x){
  const ms = x.reduce((s,v)=>s+v*v,0) / Math.max(x.length,1);
  const scale = 1 / Math.sqrt(ms + 1e-5);
  return x.map(v => v * scale);
}

function phonetic(word){
  let w = word;
  if(w.length > 3 && w.endsWith('e') && !"aeiou".includes(w[w.length-2])) w = w.slice(0,-1);
  let lastV = -1;
  for(let i=0;i<w.length;i++) if("aeiou".includes(w[i])) lastV = i;
  return lastV >= 0 ? w.slice(lastV) : w.slice(-3);
}
function rhymes(a,b){
  return a !== b && a.length > 2 && b.length > 2 && phonetic(a) === phonetic(b);
}
function bar(v){
  const n = Math.floor(v * 20);
  return '#'.repeat(n) + '.'.repeat(20 - n);
}
function sampleShuffled(arr, n){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a.slice(0,n);
}

// ═══════════════════════════════════════════════════════════════════
// DETERMINISTIC PRNG for ghost transformer weights
// ═══════════════════════════════════════════════════════════════════
function mulberry32(seed){
  let t = seed >>> 0;
  return function(){
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ (t >>> 15), 1 | t);
    r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
    return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
  };
}
function gaussian(rand, std=1){
  let u = 0, v = 0;
  while(u === 0) u = rand();
  while(v === 0) v = rand();
  const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2*Math.PI*v);
  return z * std;
}
function makeMatrix(rows, cols, rand, std=0.08){
  const m = new Array(rows);
  for(let r=0;r<rows;r++){
    const row = new Float64Array(cols);
    for(let c=0;c<cols;c++) row[c] = gaussian(rand, std);
    m[r] = row;
  }
  return m;
}
function linear(x, w){
  const out = new Float64Array(w.length);
  for(let r=0;r<w.length;r++){
    let s = 0;
    const row = w[r];
    for(let c=0;c<row.length;c++) s += row[c] * x[c];
    out[r] = s;
  }
  return out;
}

// ═══════════════════════════════════════════════════════════════════
// GHOST TRANSFORMER — same architectural spirit as Python version
// ═══════════════════════════════════════════════════════════════════
class GhostTransformer {
  constructor(vocabSize){
    this.V = vocabSize;
    const rand = mulberry32(42);
    this.wte = makeMatrix(vocabSize, DIM, rand, 0.08);
    this.wpe = makeMatrix(BLOCK_SIZE, DIM, rand, 0.08);
    this.lmHead = makeMatrix(vocabSize, DIM, rand, 0.08);
    this.layers = [];
    for(let i=0;i<N_LAYER;i++){
      this.layers.push({
        wq: makeMatrix(DIM, DIM, rand, 0.08),
        wk: makeMatrix(DIM, DIM, rand, 0.08),
        wv: makeMatrix(DIM, DIM, rand, 0.08),
        wo: makeMatrix(DIM, DIM, rand, 0.08),
        wr: makeMatrix(BLOCK_SIZE, DIM, rand, 0.08), // RRPRAM: DIM → positions
        gate: [gaussian(rand, 0.1)],                   // blend gate
        ff1: makeMatrix(4*DIM, DIM, rand, 0.08),
        ff2: makeMatrix(DIM, 4*DIM, rand, 0.08),
      });
    }
    this.nParams = vocabSize*DIM*2 + DIM*BLOCK_SIZE +
      N_LAYER*(4*DIM*DIM + DIM*BLOCK_SIZE + 1 + 4*DIM*DIM + DIM*4*DIM);
  }

  forward(tokenIds, kvCache){
    const pos = kvCache[0].k.length ? kvCache[0].k.length : 0;
    const tid = ((tokenIds[tokenIds.length-1] % this.V) + this.V) % this.V;

    let x = new Float64Array(DIM);
    for(let i=0;i<DIM;i++) x[i] = this.wte[tid][i] + this.wpe[pos % BLOCK_SIZE][i];
    x = rmsnorm(Array.from(x));

    for(let li=0;li<this.layers.length;li++){
      const layer = this.layers[li];
      const xr = x.slice();
      x = rmsnorm(x);

      const q = Array.from(linear(x, layer.wq));
      const k = Array.from(linear(x, layer.wk));
      const v = Array.from(linear(x, layer.wv));

      kvCache[li].k.push(k);
      kvCache[li].v.push(v);
      const seqLen = kvCache[li].k.length;

      // ── QKV multi-head attention ──
      const xQkv = [];
      for(let h=0;h<N_HEAD;h++){
        const hs = h * HEAD_DIM;
        const qh = q.slice(hs, hs + HEAD_DIM);
        const scores = [];
        for(let t=0;t<seqLen;t++){
          const kh = kvCache[li].k[t].slice(hs, hs + HEAD_DIM);
          let dot = 0;
          for(let j=0;j<HEAD_DIM;j++) dot += qh[j] * kh[j];
          scores.push(dot / Math.sqrt(HEAD_DIM));
        }
        const w = softmaxVec(scores);
        for(let j=0;j<HEAD_DIM;j++){
          let val = 0;
          for(let t=0;t<seqLen;t++) val += w[t] * kvCache[li].v[t][hs + j];
          xQkv.push(val);
        }
      }

      // ── RRPRAM: positional routing (x @ W_r → position scores) ──
      const rrpAll = Array.from(linear(x, layer.wr));
      const rrpScores = rrpAll.slice(0, seqLen);
      const rrpW = softmaxVec(rrpScores);
      const xRrp = [];
      for(let j=0;j<DIM;j++){
        let val = 0;
        for(let t=0;t<seqLen;t++) val += rrpW[t] * kvCache[li].v[t][j];
        xRrp.push(val);
      }

      // ── gated blend: sigmoid(gate) * QKV + (1-g) * RRPRAM ──
      const g = 1.0 / (1.0 + Math.exp(-layer.gate[0]));
      const xBlend = xQkv.map((a,i) => g * a + (1.0 - g) * xRrp[i]);

      let proj = Array.from(linear(xBlend, layer.wo));
      x = proj.map((val,i) => val + xr[i]);

      const xr2 = x.slice();
      x = rmsnorm(x);
      let h1 = Array.from(linear(x, layer.ff1));
      h1 = h1.map(val => Math.max(0, val));
      let ff = Array.from(linear(h1, layer.ff2));
      x = ff.map((val,i) => val + xr2[i]);
    }

    x = rmsnorm(x);
    return Array.from(linear(x, this.lmHead));
  }
}

// ═══════════════════════════════════════════════════════════════════
// METAWEIGHTS — same logic as Python version
// ═══════════════════════════════════════════════════════════════════
class MetaWeights {
  constructor(words){
    this.words = words;
    this.w2i = {};
    words.forEach((w,i)=>this.w2i[w]=i);
    this.V = words.length;
    this.bigram = new Map();
    this.cooc = new Map();
    this.prophecy = new Map();
    this.destiny = new Float64Array(this.V);
    this.trauma = 0.0;
    this._buildFromOrdering();
    this._buildFromCorpus();
    this._buildSPA();
  }
  _bgKey(a,b){ return `${a},${b}`; }
  _coKey(a,b){ return `${Math.min(a,b)},${Math.max(a,b)}`; }

  _buildFromOrdering(){
    for(let i=0;i<this.V;i++){
      for(let j=Math.max(0, i-5); j<Math.min(this.V, i+6); j++){
        if(i === j) continue;
        const decay = 1.0 / (1.0 + Math.abs(i-j));
        const key = this._coKey(i,j);
        this.cooc.set(key, (this.cooc.get(key) || 0) + decay);
        if(j === i+1){
          const k = this._bgKey(i,j);
          this.bigram.set(k, (this.bigram.get(k) || 0) + 1.0);
        }
      }
    }
  }

  _buildFromCorpus(){
    const corpusWords = SEED_CORPUS.toLowerCase().split(/\s+/)
      .map(w => w.replace(/[.,!?]/g,''))
      .filter(w => this.w2i[w] !== undefined);
    for(let i=0;i<corpusWords.length-1;i++){
      const a = this.w2i[corpusWords[i]];
      const b = this.w2i[corpusWords[i+1]];
      const bg = this._bgKey(a,b);
      const co = this._coKey(a,b);
      this.bigram.set(bg, (this.bigram.get(bg) || 0) + 2.0);
      this.cooc.set(co, (this.cooc.get(co) || 0) + 1.0);
    }
  }

  _buildSPA(){
    // SPA: Sentence-level Positional Attention (from Q).
    // Multi-word entries sharing content words get co-occurrence boost.
    const wordIndex = {};
    for(let i=0;i<this.V;i++){
      const tokens = this.words[i].toLowerCase().split(/\s+/);
      if(tokens.length < 2) continue;
      for(let tok of tokens){
        tok = tok.replace(/[.,!?;:"'\-\(\)\[\]]/g, '');
        if(tok.length > 3){
          if(!wordIndex[tok]) wordIndex[tok] = [];
          wordIndex[tok].push(i);
        }
      }
    }
    for(const ids of Object.values(wordIndex)){
      if(ids.length < 2 || ids.length > 50) continue;
      for(let i=0;i<ids.length;i++){
        for(let j=i+1;j<Math.min(i+10, ids.length);j++){
          const key = this._coKey(ids[i], ids[j]);
          this.cooc.set(key, (this.cooc.get(key) || 0) + 0.3);
        }
      }
    }
  }

  bi(a,b){ return this.bigram.get(this._bgKey(a,b)) || 0.001; }
  hebb(a,b){ return this.cooc.get(this._coKey(a,b)) || 0.0; }
  proph(wid){ return this.prophecy.get(wid) || 0.0; }
  addProphecy(wid, debt=1.0){ this.prophecy.set(wid, this.proph(wid) + debt); }
  fulfill(wid){ this.prophecy.delete(wid); }
  updateOnline(prev, curr){
    const ck = this._coKey(prev,curr);
    const bk = this._bgKey(prev,curr);
    this.cooc.set(ck, (this.cooc.get(ck) || 0) + 0.5);
    this.bigram.set(bk, (this.bigram.get(bk) || 0) + 0.5);
    this.trauma = Math.min(1.0, this.trauma + 0.05) * 0.97;
  }
}

// ═══════════════════════════════════════════════════════════════════
// KURAMOTO CHAMBERS
// ═══════════════════════════════════════════════════════════════════
class KuramotoChambers {
  constructor(){
    this.act = CHAMBERS.map(() => Math.random() * 0.2);
  }
  excite(word, cats){
    const cat = wordToCat(word, cats);
    if(cat && CAT_TO_CHAMBER[cat] !== undefined){
      const idx = CAT_TO_CHAMBER[cat];
      this.act[idx] = Math.min(1.0, this.act[idx] + 0.25);
    }
  }
  step(){
    for(let iter=0; iter<CROSSFIRE_ITER; iter++){
      const old = [...this.act];
      for(let i=0;i<this.act.length;i++){
        this.act[i] *= CHAMBER_DECAY[i];
        for(let j=0;j<this.act.length;j++){
          if(i !== j) this.act[i] += CROSSFIRE_K * Math.sin(old[j] - old[i]);
        }
        this.act[i] = Math.max(0.0, Math.min(1.0, this.act[i]));
      }
    }
  }
  tauMod(){
    return 1.0 + 0.3 * this.act[1] - 0.2 * this.act[2] + 0.15 * this.act[4];
  }
  display(){
    return this.act
      .map((v,i) => v > 0.08 ? `${CHAMBERS[i]}:${v.toFixed(2)}` : null)
      .filter(Boolean)
      .join(' ');
  }
}

// ═══════════════════════════════════════════════════════════════════
// ENGINE
// ═══════════════════════════════════════════════════════════════════
class MicroKarpathy {
  constructor(vocabText){
    const {words, cats} = parseVocab(vocabText);
    this.words = words;
    this.cats = cats;
    this.vocabSet = new Set(words);
    this.w2i = {};
    words.forEach((w,i)=>this.w2i[w]=i);
    this.V = words.length;
    this.embeds = {};
    for(const w of words) this.embeds[w] = hashEmbed(w);

    this.meta = new MetaWeights(words);
    this.chambers = new KuramotoChambers();
    this.xf = new GhostTransformer(this.V);
  }

  nearestVocab(word){
    const wb = charBigrams(word);
    let best = this.words[0];
    let bestS = -1;
    for(const w of this.words){
      const wv = charBigrams(w);
      let inter = 0;
      for(const bg of wb) if(wv.has(bg)) inter++;
      const union = wb.size + wv.size - inter;
      let s = union > 0 ? inter / union : 0;
      let pref = 0;
      for(let i=0;i<Math.min(word.length, w.length); i++){
        if(word[i] === w[i]) pref++;
        else break;
      }
      s += pref * 0.15;
      if(s > bestS){
        bestS = s;
        best = w;
      }
    }
    return best;
  }

  dissect(prompt){
    let tokens = prompt.toLowerCase().split(/\s+/)
      .map(t => t.replace(/[.,!?;:"'\-\(\)\[\]]/g, ''))
      .filter(t => t && !STOPS.has(t) && t.length > 1);

    // matched to Python: keep original words, do not remap here
    if(tokens.length === 0) tokens = [this.words[0]];
    const seen = new Set();
    const core = [];
    for(const w of tokens){
      if(!seen.has(w)){
        seen.add(w);
        core.push(w);
      }
    }
    return core.slice(0, 5);
  }

  findNeighbors(word, n=TREE_WIDTH, exclude=null){
    const ex = exclude || new Set();
    const wid = this.w2i[word];
    if(wid === undefined){
      const vec = hashEmbed(word);
      const scored = this.words.filter(w => !ex.has(w)).map(w => [cosineSim(vec, this.embeds[w]), w]);
      scored.sort((a,b)=>b[0]-a[0]);
      return sampleShuffled(scored.slice(0, n*2).map(x=>x[1]), Math.min(n, scored.length));
    }

    let nLocal = n;
    const teleports = [];
    if(Math.random() < 0.4 && this.words.length > 100){
      const region = Math.floor(wid / 100);
      const distant = this.words.filter(w => Math.abs(Math.floor(this.w2i[w]/100) - region) >= 2 && !ex.has(w));
      if(distant.length){
        teleports.push(distant[Math.floor(Math.random() * distant.length)]);
        nLocal = n - 1;
      }
    }

    const scored = [];
    for(const w of this.words){
      if(w === word || ex.has(w)) continue;
      const oid = this.w2i[w];
      const h = this.meta.hebb(wid, oid);
      const c = cosineSim(this.embeds[word], this.embeds[w]);
      scored.push([h * 0.7 + c * 0.3, w]);
    }
    scored.sort((a,b)=>b[0]-a[0]);
    const top = scored.slice(0, nLocal * 2).map(x=>x[1]);
    return sampleShuffled(top, Math.min(nLocal, top.length)).concat(teleports);
  }

  buildTree(root, w=TREE_WIDTH, d=TREE_DEPTH, used=null){
    if(!used) used = new Set();
    used.add(root);
    if(d === 0) return {w: root, ch: []};
    const nbrs = this.findNeighbors(root, w, used);
    for(const n of nbrs) used.add(n);
    return {w: root, ch: nbrs.map(n => this.buildTree(n, w, d-1, used))};
  }

  collectLeaves(tree){
    if(!tree.ch.length) return [tree.w];
    const out = [];
    for(const c of tree.ch) out.push(...this.collectLeaves(c));
    return out;
  }

  darioSample(ctx, candidates, xfLogits, usedCats){
    if(!candidates.length) return Math.floor(Math.random()*this.V);
    const prev = ctx.length ? ctx[ctx.length-1] : 0;
    const tau = TAU_BASE * this.chambers.tauMod();

    const scores = [];
    for(const cid of candidates){
      const T_x = cid < xfLogits.length ? xfLogits[cid] : 0.0;
      const B = BIGRAM_W * Math.log(this.meta.bi(prev, cid) + 1e-10);
      const H = ALPHA_D * this.meta.hebb(prev, cid);
      const F = BETA_D * this.meta.proph(cid);
      const A = GAMMA_D * this.meta.destiny[cid];
      const Tr = this.meta.trauma * 0.1;
      const region = Math.floor(cid / 100);
      const div = -1.5 * (usedCats[region] || 0);
      scores.push((T_x + B + H + F + A + Tr + div) / tau);
    }

    const probs = softmaxVec(scores);
    const indexed = probs.map((p,i)=>[i,p]).sort((a,b)=>b[1]-a[1]).slice(0, TOP_K);
    const top = indexed.map(([i,p]) => [candidates[i], p]);
    const total = top.reduce((s,x)=>s+x[1],0) + 1e-10;
    let r = Math.random(), cum = 0;
    for(const [wid,p] of top){
      cum += p / total;
      if(r <= cum) return wid;
    }
    return top[top.length-1][0];
  }

  reassemble(leafWords){
    const leafIds = [...new Set(leafWords.map(w => this.w2i[w]).filter(v => v !== undefined))];
    if(!leafIds.length) return [];

    for(const lid of leafIds) this.meta.destiny[lid] += 1.0;

    const counts = new Map();
    for(const id of leafIds) counts.set(id, (counts.get(id)||0)+1);
    [...counts.entries()]
      .sort((a,b)=>b[1]-a[1])
      .slice(0,8)
      .forEach(([wid,cnt]) => this.meta.addProphecy(wid, cnt*0.5));

    const kv = Array.from({length:N_LAYER}, () => ({k:[], v:[]}));
    const chain = [leafIds[Math.floor(Math.random()*leafIds.length)]];
    const used = new Set(chain);
    const usedCats = {};

    for(let i=0;i<CORPSE_LEN-1;i++){
      const logits = this.xf.forward(chain, kv);
      this.chambers.excite(this.words[chain[chain.length-1]], this.cats);
      this.chambers.step();

      let cands = leafIds.filter(id => !used.has(id));
      if(cands.length < 3) cands = leafIds;

      const nxt = this.darioSample(chain, cands, logits, usedCats);
      chain.push(nxt);
      used.add(nxt);

      const region = Math.floor(nxt / 100);
      usedCats[region] = (usedCats[region] || 0) + 1;

      this.meta.updateOnline(chain[chain.length-2], nxt);
      this.meta.fulfill(nxt);
    }

    return chain;
  }

  brodskyFormat(wordList){
    const out = [];
    let nn = 0;
    for(const w of wordList){
      const cat = wordToCat(w, this.cats);
      const isVerb = cat !== null && VERB_CATS.has(cat);

      if(isVerb){
        if(out.length) out.push('. ');
        out.push(w[0].toUpperCase() + w.slice(1));
        nn = 0;
      } else {
        if(!out.length){
          out.push(w[0].toUpperCase() + w.slice(1));
        } else if(nn >= 2){
          out.push(' — ' + w);
          nn = 0;
        } else {
          const last = out[out.length - 1];
          if(last && /[.!]$/.test(last)){
            out.push(' ' + w[0].toUpperCase() + w.slice(1));
          } else {
            out.push(', ' + w);
          }
        }
        nn += 1;
      }
    }
    return out.join('');
  }

  makeCoda(chain){
    const cw = chain.map(wid => this.words[wid]);
    const shuffled = [...cw].sort(() => Math.random() - 0.5);
    let end1 = null, end2 = null;

    for(const w1 of shuffled){
      for(const w2 of cw){
        if(rhymes(w1, w2)){ end1 = w1; end2 = w2; break; }
      }
      if(end1) break;
      for(const w2 of this.words){
        if(rhymes(w1, w2)){ end1 = w1; end2 = w2; break; }
      }
      if(end1) break;
    }
    if(!end1){ end1 = cw[0]; end2 = cw[cw.length-1]; }

    const body = cw.filter(w => w !== end1 && w !== end2);
    const mid = Math.max(Math.floor(cw.length / 2), 3);
    const l1Words = body.slice(0, mid-1).concat([end1]);
    let l2Words = body.slice(mid-1, mid+5).concat([end2]);
    if(l2Words.length < 3) l2Words = body.slice(1,5).concat([end2]);

    return [this.brodskyFormat(l1Words), this.brodskyFormat(l2Words)];
  }

  phonDiversity(ws){
    return new Set(ws.map(phonetic)).size / Math.max(ws.length, 1);
  }

  mutDepth(leaves){
    return Math.min(1.0, new Set(leaves).size / Math.max(leaves.length, 1));
  }
}

// ═══════════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════════
let engine = new MicroKarpathy(DEFAULT_VOCAB);

const term = document.getElementById('console');
const inputEl = document.getElementById('prompt');
const btnEl = document.getElementById('btn');
const fileEl = document.getElementById('file-input');
const cursorHtml = '<span class="cursor"></span>';
let typing = false;

function scrollBottom(){ term.scrollTop = term.scrollHeight; }
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

async function typeText(text, delay=10, cls=''){
  let html = term.innerHTML.replace(cursorHtml, '');
  const esc = (s) => s
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'\n');
  for(let i=0;i<text.length;i++){
    const ch = esc(text[i]);
    html += cls ? `<span class="${cls}">${ch}</span>` : ch;
    term.innerHTML = html + cursorHtml;
    scrollBottom();
    await sleep(delay + Math.random()*6);
  }
}

async function printTree(tree, pre="", last=true){
  const conn = last ? "└─ " : "├─ ";
  await typeText(pre + conn, 2);
  await typeText(tree.w + "\n", 6, 'bone');
  const childPre = pre + (last ? "   " : "│  ");
  for(let i=0;i<tree.ch.length;i++){
    await printTree(tree.ch[i], childPre, i === tree.ch.length-1);
  }
}

function appendLineNow(htmlLine){
  const html = term.innerHTML.replace(cursorHtml, '');
  term.innerHTML = html + htmlLine + cursorHtml;
  scrollBottom();
}

fileEl.addEventListener('change', (ev) => {
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    engine = new MicroKarpathy(String(e.target.result || ""));
    appendLineNow(`\n<span class="bone">[loaded ${engine.V} words from ${file.name}]</span>\n`);
  };
  reader.readAsText(file);
});

inputEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    startAutopsy();
  }
});
btnEl.addEventListener('click', startAutopsy);

async function startAutopsy(){
  const prompt = inputEl.value.trim();
  if(!prompt || typing) return;

  typing = true;
  inputEl.disabled = true;
  btnEl.disabled = true;
  inputEl.value = "";

  // fresh organs each run
  const vocabText = engine.words.join('\n'); // not enough to preserve categories, so rebuild from last parsed source isn't possible here
  // keep current loaded engine instead of rebuilding blindly
  engine.meta = new MetaWeights(engine.words);
  engine.chambers = new KuramotoChambers();
  engine.xf = new GhostTransformer(engine.V);

  appendLineNow(`\n<span class="bone">&gt; ${prompt.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>\n\n`);
  await sleep(180);

  await typeText("  MICROKARPATHY — Educational Prompt Autopsy\n\n");

  await typeText(`  vocab: ${engine.V} words | ghost params: ${engine.xf.nParams.toLocaleString()} | trained: 0\n\n`);
  await typeText("=".repeat(64) + "\n");
  await typeText("  AUTOPSY REPORT\n", 10, "blood");
  await typeText(`  Subject: "${prompt}"\n`);
  await typeText("=".repeat(64) + "\n\n");

  const core = engine.dissect(prompt);
  await typeText("  Core words: ");
  await typeText(core.join(" ") + "\n", 12, "bone");

  let allLeaves = [];
  for(const word of core){
    await typeText(`\n  Tree [${word}]:\n`, 7, 'blood');
    const tree = engine.buildTree(word);
    await printTree(tree, "    ", true);
    allLeaves.push(...engine.collectLeaves(tree));
  }

  const uniqueLeaves = [...new Set(allLeaves)];
  await typeText(`\n  Collected ${uniqueLeaves.length} unique leaves\n`);

  const chain = engine.reassemble(uniqueLeaves);
  const corpse = chain.map(wid => engine.words[wid]);

  await typeText(`\n  ── CORPSE ─────────────────────────────────────────────────────────\n`, 5, 'blood');

  if(corpse.length >= 5){
    const tmpl = TEMPLATES[Math.floor(Math.random()*TEMPLATES.length)];
    const fill = sampleShuffled(corpse, Math.min(6, corpse.length));
    while(fill.length < 6) fill.push(corpse[0]);
    let sentence = tmpl;
    for(let i=0;i<6;i++) sentence = sentence.replace(`{${i}}`, fill[i] || '');
    await typeText(`  ${sentence}\n`, 18);
  }

  await typeText(`  ${corpse.join(" ")}.\n`, 18);

  const [l1, l2] = engine.makeCoda(chain);
  await typeText(`\n  ── CODA ──────────────────────────────────────────────────────────\n`, 5, 'blood');
  await typeText(`  ${l1},\n`, 24, 'blood');
  await typeText(`  ${l2}.\n`, 24, 'blood');

  const ch = engine.chambers.display();
  if(ch){
    await typeText(`\n  chambers: ${ch}\n`);
  }

  const pd = engine.phonDiversity(corpse);
  const md = engine.mutDepth(allLeaves);

  await typeText(`\n  ── METRICS ────────────────────────────────────────────────────────\n`, 5);
  await typeText(`  Phonetic Diversity: [${bar(pd)}] ${pd.toFixed(3)}\n`);
  await typeText(`  Mutation Depth:     [${bar(md)}] ${md.toFixed(3)}\n`);
  await typeText(`\n  Vocabulary: ${engine.V} | Co-occurrences: ${engine.meta.cooc.size}\n`);
  await typeText(`  Prophecies: ${engine.meta.prophecy.size} active | Trauma: ${engine.meta.trauma.toFixed(3)}\n`);

  appendLineNow(`\n<div class="signature">[autopsy complete. — microKarpathy.]</div>\n\n`);

  typing = false;
  inputEl.disabled = false;
  btnEl.disabled = false;
  inputEl.focus();
}

// boot banner
appendLineNow(
`<span class="bone">microKarpathy Education Autopsy Engine Loaded.
upload microkarpathy.txt for the full body, or use the embedded default.</span>\n`
);
</script>
</body>
