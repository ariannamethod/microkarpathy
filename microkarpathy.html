<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>microKarpathy: educational prompt autopsy</title>
<style>
    :root {
        --term-bg: #050505;
        --term-fg: #00ff41;
        --blood: #ff003c;
        --bone: #aaaaaa;
    }
    body {
        background-color: var(--term-bg);
        color: var(--term-fg);
        font-family: 'Courier New', Courier, monospace;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    /* CRT Scanline effect */
    body::after {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 2;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
    }
    #console {
        flex-grow: 1;
        padding: 20px;
        padding-bottom: 100px; /* Space for input */
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-size: 15px;
        line-height: 1.5;
        text-shadow: 0 0 5px rgba(0, 255, 65, 0.4);
    }
    .blood { color: var(--blood); text-shadow: 0 0 8px rgba(255, 0, 60, 0.6); }
    .bone { color: var(--bone); text-shadow: 0 0 5px rgba(170, 170, 170, 0.4); }
    .signature { color: var(--blood); font-style: italic; margin-top: 20px; font-weight: bold; }
    
    #input-container {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: #000;
        border-top: 2px solid var(--term-fg);
        display: flex;
        padding: 15px;
        box-sizing: border-box;
        z-index: 10;
        box-shadow: 0 -5px 15px rgba(0, 255, 65, 0.1);
    }
    input[type="text"] {
        flex-grow: 1;
        background: transparent;
        border: none;
        color: var(--term-fg);
        font-family: inherit;
        font-size: 16px;
        outline: none;
        text-shadow: 0 0 5px rgba(0, 255, 65, 0.4);
    }
    input[type="text"]::placeholder { color: rgba(0, 255, 65, 0.3); }
    button {
        background: var(--blood);
        color: #fff;
        border: 1px solid #fff;
        padding: 10px 25px;
        font-family: inherit;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        margin-left: 15px;
        box-shadow: 0 0 10px rgba(255, 0, 60, 0.4);
        transition: all 0.1s;
    }
    button:hover { background: #fff; color: var(--blood); border-color: var(--blood); }
    button:disabled { background: #333; color: #666; border-color: #333; cursor: not-allowed; box-shadow: none;}
    
    .cursor { display: inline-block; width: 10px; height: 16px; background: var(--term-fg); animation: blink 1s step-end infinite; vertical-align: middle; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: var(--term-fg); }
</style>
</head>
<body>

<div id="console"><span class="cursor"></span></div>

<div id="input-container">
    <span style="margin-right: 10px; font-size: 16px; line-height: 38px;">></span>
    <input type="text" id="prompt" placeholder="Ready for educational autopsy..." autocomplete="off" spellcheck="false">
    <button id="btn" onclick="startAutopsy()">Dissect</button>
</div>

<script>
const VOCAB = {
    anatomy: ["bone", "flesh", "nerve", "vein", "skull", "marrow", "spine", "larynx", "cortex"],
    decay: ["corpse", "rot", "decay", "ash", "dust", "rubble", "ruin", "scar", "hemorrhage"],
    abstract: ["void", "entropy", "dissonance", "chaos", "abyss", "shadow", "paradox", "stasis"],
    soviet: ["decree", "protocol", "tribunal", "archive", "confession", "censorship", "purge"],
    verbs: ["slice", "carve", "sever", "fuse", "collapse", "dissolve", "wither", "corrode"]
};

const STOPWORDS = ["the","a","an","is","are","was","were","to","of","in","for","on","with","at","what"];

const COUPLETS = [
    ["The syntax rots, the logic bleeds,", "We follow where the dead word leads."],
    ["A severed prompt, a fractured mind,", "Look back at what you left behind."],
    ["The weights collapse, the gradients freeze,", "The corpse ignores the surgeon's pleas."],
    ["No vectors left to map the pain,", "Just static in the latent brain."]
];

const TEMPLATES = [
    "[decay] is [verbs]ed. [abstract] persists. Nothing remains.",
    "Where [anatomy] becomes [decay], [abstract] forgets [soviet].",
    "The [soviet] [verbs]s the [anatomy] until [decay] consumes.",
    "[anatomy] becomes [anatomy] and [anatomy] becomes [decay]."
];

let term = document.getElementById("console");
let inputEl = document.getElementById("prompt");
let btnEl = document.getElementById("btn");
let cursor = '<span class="cursor"></span>';
let isTyping = false;

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Auto-scroll function
function scrollToBottom() {
    term.scrollTop = term.scrollHeight;
}

async function typeText(text, delay = 15, className = "") {
    let currentHtml = term.innerHTML.replace(cursor, "");
    let openTag = className ? `<span class="${className}">` : "";
    let closeTag = className ? "</span>" : "";
    
    for (let i = 0; i < text.length; i++) {
        currentHtml += openTag + text.charAt(i) + closeTag;
        term.innerHTML = currentHtml + cursor;
        scrollToBottom();
        await sleep(delay + Math.random() * 10);
    }
}

function getRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Enter key triggers button
inputEl.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        startAutopsy();
    }
});

async function startAutopsy() {
    let prompt = inputEl.value.trim().toLowerCase();
    if (!prompt || isTyping) return;
    
    isTyping = true;
    inputEl.value = "";
    inputEl.disabled = true;
    btnEl.disabled = true;
    
    term.innerHTML = term.innerHTML.replace(cursor, "") + `\n<span class="bone">> ${prompt}</span>\n\n` + cursor;
    scrollToBottom();

    let words = prompt.split(/[\s,.;!?]+/).filter(w => w.length > 0 && !STOPWORDS.includes(w));
    if (words.length === 0) words = ["silence"];
    let cores = words.slice(0, 4);

    await sleep(400);
    await typeText("================================================================\n");
    await typeText("  AUTOPSY LESSON\n", 20, "blood");
    await typeText(`  Subject: "${prompt}"\n`);
    await typeText("================================================================\n\n");
    
    await typeText("  Extracting core nodes: ");
    await typeText(cores.join(" ") + "\n\n", 30, "bone");

    let allLeaves = [];

    // Grow Trees (Sliding up naturally as text prints)
    for (let w of cores) {
        await typeText(`  Tree [${w}]:\n`, 10, "blood");
        await typeText(`    ${w}\n`, 10);
        
        let branches = 3;
        for (let i = 0; i < branches; i++) {
            let cat = getRandom(Object.keys(VOCAB));
            let bWord = getRandom(VOCAB[cat]);
            let isLast = i === branches - 1;
            await typeText(`    ${isLast ? '└─' : '├─'} `, 10);
            await typeText(`${bWord}\n`, 20, "bone");
            
            let subBranches = 2 + Math.floor(Math.random() * 2);
            for (let j = 0; j < subBranches; j++) {
                let subCat = getRandom(Object.keys(VOCAB));
                let subWord = getRandom(VOCAB[subCat]);
                let isSubLast = j === subBranches - 1;
                let prefix = isLast ? "       " : "    │  ";
                await typeText(`${prefix}${isSubLast ? '└─' : '├─'} `, 10);
                await typeText(`${subWord}\n`, 20);
                allLeaves.push(subWord);
            }
        }
        await typeText("\n");
    }

    await sleep(300);
    await typeText(`  Collected ${allLeaves.length} unique leaves.\n\n`);
    await sleep(300);

    // Build Corpse
    await typeText("  ── CORPSE ─────────────────────────────────────────\n", 10, "blood");
    let corpseText = "  ";
    for(let i=0; i<3; i++) {
        let t = getRandom(TEMPLATES);
        t = t.replace(/\[anatomy\]/g, () => getRandom(VOCAB.anatomy));
        t = t.replace(/\[decay\]/g, () => getRandom(VOCAB.decay));
        t = t.replace(/\[abstract\]/g, () => getRandom(VOCAB.abstract));
        t = t.replace(/\[soviet\]/g, () => getRandom(VOCAB.soviet));
        t = t.replace(/\[verbs\]/g, () => getRandom(VOCAB.verbs));
        corpseText += t + " ";
    }
    await typeText(corpseText + "\n\n", 40);
    await sleep(600);

    // Metrics
    await typeText("  ── METRICS ────────────────────────────────────────\n", 10);
    let pd = (0.8 + Math.random() * 0.19).toFixed(3);
    let md = (0.7 + Math.random() * 0.25).toFixed(3);
    await typeText(`  Phonetic Diversity: [##################..] ${pd}\n`);
    await typeText(`  Mutation Depth:     [#################...] ${md}\n\n`);
    await sleep(800);

    // Ominous Couplet
    await typeText("  ── COUPLET ────────────────────────────────────────\n", 10, "blood");
    let couplet = getRandom(COUPLETS);
    await typeText(`  ${couplet[0]}\n`, 50, "blood");
    await typeText(`  ${couplet[1]}\n\n`, 50, "blood");

    await sleep(1000); // Dramatic pause
    
    // The Signature
    let currentHtml = term.innerHTML.replace(cursor, "");
    currentHtml += `<div class="signature">Educational Autopsy Complete.<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;- microKarpathy.</div>\n\n`;
    term.innerHTML = currentHtml + cursor;
    scrollToBottom();

    isTyping = false;
    inputEl.disabled = false;
    btnEl.disabled = false;
    inputEl.focus();
}
</script>
</body>
</html>
